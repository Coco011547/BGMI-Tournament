<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BGMI Tournament Hub</title>
    <style>
        body { background-color: #121212; color: #fff; font-family: sans-serif; padding: 20px; max-width: 800px; margin: auto; }
        .nav { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .nav a { color: #f39c12; text-decoration: none; font-weight: bold; padding: 8px 16px; border: 1px solid #f39c12; border-radius: 4px; }
        .info-card { background: #1e1e1e; border: 2px solid #333; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; }
        .info-card h2 { margin: 0 0 10px 0; color: #f1c40f; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 1.1rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px 8px; border-bottom: 1px solid #333; text-align: center; }
        th { background-color: #f39c12; color: #000; }
        @media (max-width: 500px) { .info-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="nav">
        <a href="register.html">Register Team</a>
        <a href="admin.html">Admin Panel</a>
    </div>

    <div class="info-card">
        <h2>Next Match Info</h2>
        <div class="info-grid" id="match-info">
            <div>Loading room data...</div>
        </div>
    </div>
    
    <h2 style="text-align: center; color: #f39c12;">Current Standings</h2>
    <div style="overflow-x: auto;">
        <table>
            <thead>
                <tr><th>Rank</th><th>Team</th><th>Matches</th><th>WWCD</th><th>Kills</th><th>Points</th></tr>
            </thead>
            <tbody id="board"><tr><td colspan="6">Loading live data...</td></tr></tbody>
        </table>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwQowxA5loM-COyL7ud65vqKDJ7-JUAnCdRAzSbZeMN1Rb7QRwObddGjf5uecq3Tkzz6A/exec";

        function getPoints(rank) {
            const p = {1:10, 2:6, 3:5, 4:4, 5:3, 6:2, 7:1, 8:1};
            return p[rank] || 0;
        }

        async function load() {
            // Load Match Info
            try {
                const infoRes = await fetch(API_URL + "?action=read_info");
                const infoData = await infoRes.json();
                if(infoData.length > 1) {
                    const [time, room, pass, map] = infoData[1];
                    document.getElementById('match-info').innerHTML = `
                        <div><strong>Time:</strong> ${time}</div>
                        <div><strong>Map:</strong> ${map}</div>
                        <div><strong>Room ID:</strong> ${room}</div>
                        <div><strong>Password:</strong> ${pass}</div>
                    `;
                } else {
                    document.getElementById('match-info').innerHTML = "<div>No match scheduled yet.</div>";
                }
            } catch(e) { 
                document.getElementById('match-info').innerHTML = "<div>Error loading match info.</div>"; 
            }

            // Load Leaderboard
            try {
                const res = await fetch(API_URL + "?action=read_scores");
                const data = await res.json();
                const teams = {};
                for (let i = 1; i < data.length; i++) {
                    const [id, match, team, rank, kills] = data[i];
                    if (!team) continue;
                    if (!teams[team]) teams[team] = { matches: 0, wwcd: 0, kills: 0, points: 0 };
                    teams[team].matches += 1;
                    teams[team].kills += parseInt(kills);
                    teams[team].points += parseInt(kills) + getPoints(parseInt(rank));
                    if (parseInt(rank) === 1) teams[team].wwcd += 1;
                }
                const sorted = Object.entries(teams).map(([name, s]) => ({name, ...s})).sort((a,b) => b.points - a.points || b.wwcd - a.wwcd || b.kills - a.kills);
                let html = "";
                sorted.forEach((t, i) => {
                    let style = i === 0 ? "font-weight:bold; color:#f1c40f;" : "";
                    html += `<tr style="${style}"><td>${i+1}</td><td>${t.name}</td><td>${t.matches}</td><td>${t.wwcd}</td><td>${t.kills}</td><td><strong>${t.points}</strong></td></tr>`;
                });
                document.getElementById('board').innerHTML = html || "<tr><td colspan='6'>No matches played yet.</td></tr>";
            } catch(e) {
                document.getElementById('board').innerHTML = "<tr><td colspan='6'>Error loading database. Make sure you have submitted at least one score!</td></tr>";
            }
        }
        load();
    </script>
</body>
</html>
