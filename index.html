<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BGMI TOURNAMENT HUB</title>
    <style>
        :root { --bgmi-yellow: #f1c40f; --bgmi-dark: #1a1c1e; --bgmi-card: #25282c; --bgmi-text: #e0e0e0; }
        body { background-color: var(--bgmi-dark); color: var(--bgmi-text); font-family: sans-serif; margin: 0; padding: 10px; }
        h1 { text-align: center; color: var(--bgmi-yellow); text-transform: uppercase; letter-spacing: 2px; }
        
        /* NAVIGATION */
        .nav { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
        .nav a { color: #fff; text-decoration: none; font-weight: bold; font-size: 0.7rem; padding: 12px; border: 1px solid #3f444a; background: var(--bgmi-card); text-transform: uppercase; text-align: center; border-radius: 4px; }
        .nav a:hover { background: var(--bgmi-yellow); color: #000; }

        /* COUNTDOWN & INFO */
        .info-card { background: var(--bgmi-card); border-left: 5px solid var(--bgmi-yellow); padding: 15px; border-radius: 4px; margin-bottom: 20px; }
        #countdown { font-size: 1.5rem; font-weight: bold; color: #ff4444; text-align: center; margin-top: 10px; font-family: monospace; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .info-item { background: rgba(0,0,0,0.2); padding: 8px; border: 1px solid #333; border-radius: 2px; }
        .label { font-size: 0.6rem; color: #888; text-transform: uppercase; display: block; }
        .value { font-weight: bold; color: #fff; font-size: 0.9rem; }

        /* TABLE */
        .table-container { background: var(--bgmi-card); border-radius: 4px; overflow-x: auto; border: 1px solid #3f444a; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #31363b; color: #aaa; font-size: 0.7rem; padding: 12px; text-transform: uppercase; }
        td { padding: 12px; text-align: center; border-bottom: 1px solid #3f444a; font-size: 0.85rem; }
        .points-total { color: var(--bgmi-yellow); font-weight: bold; }
    </style>
</head>
<body>

    <h1>BGMI BATTLEGROUNDS</h1>

    <div class="nav">
        <a href="register.html">Register</a>
        <a href="slots.html">Slot List</a>
        <a href="rules.html">Rules</a>
        <a href="admin.html">Admin</a>
    </div>

    <div class="info-card">
        <div id="countdown">Loading Timer...</div>
        <div class="info-grid" id="match-info">
            <div class="info-item"><span class="label">Map</span><span class="value" id="disp-map">-</span></div>
            <div class="info-item"><span class="label">Room ID</span><span class="value" id="disp-room" style="color:var(--bgmi-yellow)">-</span></div>
        </div>
    </div>
    
    <div class="table-container">
        <table>
            <thead>
                <tr><th>#</th><th style="text-align:left">SQUAD</th><th>M</th><th>FINISH</th><th>PTS</th></tr>
            </thead>
            <tbody id="board"><tr><td colspan="5">Fetching Results...</td></tr></tbody>
        </table>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwQowxA5loM-COyL7ud65vqKDJ7-JUAnCdRAzSbZeMN1Rb7QRwObddGjf5uecq3Tkzz6A/exec";

        async function load() {
            try {
                // LOAD MATCH INFO & TIMER
                const infoRes = await fetch(API_URL + "?action=read_info");
                const infoData = await infoRes.json();
                if(infoData.length > 1) {
                    const [timeStr, room, pass, map] = infoData[1];
                    document.getElementById('disp-map').innerText = map;
                    document.getElementById('disp-room').innerText = room;

                    // Timer Logic (Assuming time format like "9:00 PM")
                    setInterval(() => {
                        const now = new Date();
                        const target = new Date(now.toDateString() + ' ' + timeStr);
                        let diff = target - now;
                        if (diff < 0) { document.getElementById('countdown').innerText = "MATCH LIVE"; return; }
                        
                        const h = Math.floor(diff/3600000);
                        const m = Math.floor((diff%3600000)/60000);
                        const s = Math.floor((diff%60000)/1000);
                        document.getElementById('countdown').innerText = `${h}h ${m}m ${s}s`;
                    }, 1000);
                }

                // LOAD SCORES
                const res = await fetch(API_URL + "?action=read_scores");
                const data = await res.json();
                const teams = {};
                for (let i = 1; i < data.length; i++) {
                    const [id, m, name, rank, kills] = data[i];
                    if (!teams[name]) teams[name] = { m: 0, k: 0, p: 0 };
                    teams[name].m += 1;
                    teams[name].k += parseInt(kills);
                    const pts = {1:10, 2:6, 3:5, 4:4, 5:3, 6:2, 7:1, 8:1}[parseInt(rank)] || 0;
                    teams[name].p += parseInt(kills) + pts;
                }
                const sorted = Object.entries(teams).map(([n, s]) => ({n, ...s})).sort((a,b) => b.p - a.p);
                let html = "";
                sorted.forEach((t, i) => {
                    html += `<tr><td>${i+1}</td><td style="text-align:left;font-weight:bold">${t.n}</td><td>${t.m}</td><td>${t.k}</td><td class="points-total">${t.p}</td></tr>`;
                });
                document.getElementById('board').innerHTML = html || "<tr><td colspan='5'>No matches played.</td></tr>";
            } catch(e) { console.log(e); }
        }
        load();
    </script>
</body>
</html>
