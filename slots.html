<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLOT LIST</title>
    <style>
        body { background: #1a1c1e; color: #fff; font-family: sans-serif; padding: 20px; }
        h1 { color: #f1c40f; text-align: center; text-transform: uppercase; }
        .slot-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .slot-item { background: #25282c; border: 1px solid #3f444a; padding: 12px; border-radius: 4px; display: flex; align-items: center; }
        .slot-num { background: #f1c40f; color: #000; font-weight: bold; padding: 5px 10px; border-radius: 2px; margin-right: 15px; }
        .team-name { font-weight: bold; font-size: 0.9rem; }
        a { display: block; text-align: center; color: #aaa; text-decoration: none; margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>SLOT ALLOCATION</h1>
    <a href="index.html">⬅ Back to Home</a>
    <div class="slot-grid" id="slots">Loading Slots...</div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwQowxA5loM-COyL7ud65vqKDJ7-JUAnCdRAzSbZeMN1Rb7QRwObddGjf5uecq3Tkzz6A/exec"; // Note: You'll need to add a read_registrations action to your script!
        
        // FOR NOW: We'll use the registration data
        async function load() {
            try {
                // Note: I've updated the script below to support action=read_registrations
                const res = await fetch("https://script.google.com/macros/s/AKfycbwQowxA5loM-COyL7ud65vqKDJ7-JUAnCdRAzSbZeMN1Rb7QRwObddGjf5uecq3Tkzz6A/exec?action=read_registrations");
                const data = await res.json();
                let html = "";
                // Loop through rows (Skip header row 0)
                for(let i=1; i<data.length; i++) {
                    const team = data[i][1];
                    const slot = data[i][6] || "TBD"; // Column G is index 6
                    html += `<div class="slot-item"><div class="slot-num">${slot}</div><div class="team-name">${team}</div></div>`;
                }
                document.getElementById('slots').innerHTML = html || "No teams registered yet.";
            } catch(e) { document.getElementById('slots').innerHTML = "Error loading slots."; }
        }
        load();
    </script>
</body>
</html>
